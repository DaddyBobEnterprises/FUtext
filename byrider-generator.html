<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Byrider Text Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #d62b2b;
      --red-dark: #a81f1f;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
      --green: #2ecc71;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: var(--red);
      margin-bottom: 0.2rem;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--red);
    }

    input::placeholder { color: #444; }

    .btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: var(--red);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn:hover { background: var(--red-dark); }
    .btn:active { transform: scale(0.98); }

    .output-box {
      margin-top: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1.2rem 1rem;
      display: none;
      position: relative;
    }

    .output-box.visible { display: block; }

    .output-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    #output {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
    }

    .copy-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 0.8rem;
      gap: 0.5rem;
    }

    .copy-status {
      font-size: 0.75rem;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .copy-status.show { opacity: 1; }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .copy-btn:hover { border-color: var(--red); color: var(--red); }

    .saved-badge {
      font-size: 0.7rem;
      color: var(--green);
      margin-left: 0.5rem;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .saved-badge.show { opacity: 1; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">BYRIDER</div>
  <div class="subtitle">Lead Text Generator</div>

  <div class="field">
    <label for="yourName">Your Name <span class="saved-badge" id="savedBadge">✓ Saved</span></label>
    <input type="text" id="yourName" placeholder="Sales rep name" autocomplete="off" />
  </div>

  <div class="field">
    <label for="leadName">Lead's Name</label>
    <input type="text" id="leadName" placeholder="Lead name" autocomplete="off" />
  </div>

  <button class="btn" id="generateBtn">Generate Text</button>

  <div class="output-box" id="outputBox">
    <div class="output-label">Generated Message</div>
    <div id="output"></div>
    <div class="copy-bar">
      <span class="copy-status" id="copyStatus">Copied!</span>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
  </div>
</div>

<script>
  const APP = {
    salespersonName: "",

    intros: [
      (lead, rep) => "Hey " + lead + ", " + rep + " at Byrider here.",
      (lead, rep) => lead + ", " + rep + " reaching out from Byrider.",
      (lead) => lead + ", just touching base.",
      (lead) => lead + ", I was looking at your information."
    ],

    contexts: [
      "We specialize in helping customers regardless of credit situation with down payments as low as $500.",
      "Your application has already been received and reviewed and I'm sure we could help you get into a new car.",
      "I think we have several vehicles that could fit what you're looking for and all of our vehicles have our 2 year 24,000 mile warranty.",
      "We currently have several vehicles available that may be a good fit and I think you'd really like them.",
      "The next step is simply finding a time that works for you to come in and look at some options in person.",
      "My goal is to make this car buying process as simple and stress-free as possible by doing everything I can to get you approved.",
      "Based on what I see, I think we may be able to help you get into a new car with a 2 year 24,000 mile warranty."
    ],

    expands: [
      "Are you normally more of a morning or afternoon person?",
      "What time could you make it in today to get you into a new vehicle?",
      "Would today or tomorrow work better for you to come in and get you in a new vehicle?",
      "Could you stop by after work today to finish everything?",
      "Are you available sometime in the next day or two to come in and finish everything?",
      "What time can you make it in today to wrap everything up?",
      "When would you like to come take a look at some vehicles and then drive away in one?"
    ]
  };

  function randomFrom(array) {
    return array[Math.floor(Math.random() * array.length)];
  }

  function loadSalesperson() {
    const saved = localStorage.getItem("salespersonName");
    if (!saved) return;
    APP.salespersonName = saved;
    document.getElementById("yourName").value = saved;
  }

  function saveSalesperson() {
    const name = document.getElementById("yourName").value.trim();
    APP.salespersonName = name;
    localStorage.setItem("salespersonName", name);

    const badge = document.getElementById("savedBadge");
    badge.classList.add("show");
    setTimeout(() => badge.classList.remove("show"), 1500);
  }

  function generateText() {
    saveSalesperson();

    const leadName = document.getElementById("leadName").value.trim();
    if (!leadName) {
      alert("Please enter a lead name.");
      return;
    }

    const intro   = randomFrom(APP.intros)(leadName, APP.salespersonName);
    const context = randomFrom(APP.contexts);
    const expand  = randomFrom(APP.expands);
    const message = intro + " " + context + " " + expand;

    document.getElementById("output").textContent = message;
    document.getElementById("outputBox").classList.add("visible");

    navigator.clipboard.writeText(message).catch(() => {});
  }

  function copyToClipboard() {
    const text = document.getElementById("output").textContent;
    navigator.clipboard.writeText(text).then(() => {
      const status = document.getElementById("copyStatus");
      status.classList.add("show");
      setTimeout(() => status.classList.remove("show"), 1800);
    });
  }

  window.addEventListener("load", () => {
    loadSalesperson();
    document.getElementById("generateBtn").addEventListener("click", generateText);
    document.getElementById("yourName").addEventListener("change", saveSalesperson);
    document.getElementById("copyBtn").addEventListener("click", copyToClipboard);
  });
</script>

</body>
</html>
